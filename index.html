<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Constitutional Forcing — A Programme · ARC Institute of Knowware</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&display=swap" rel="stylesheet">
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // This script takes the current url and converts the path and query string into arguments:
      // https://iamkhayyam.github.io/the-programme/play?id=123 -> https://iamkhayyam.github.io/the-programme/?p=/play&q=id=123
      (function(l) {
        if (l.search[1] === 'p') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).filter(function(s) {
            return s.slice(0, 2) === 'p='
          })[0].slice(2);
          if (decoded !== l.pathname.slice(l.pathname.lastIndexOf('/') + 1)) {
            window.history.replaceState(null, null,
              l.pathname.slice(0, l.pathname.lastIndexOf('/') + 1) + decoded.replace(/^\//, '') + (l.hash || '')
            );
          }
        }
      }(window.location))
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
